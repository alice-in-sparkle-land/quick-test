<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Spirit Keeper · Ghibli Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #cde2cd 0%, #b1cfaa 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Hiragino Kaku Gothic ProN', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 1rem 0.9rem 2rem;
            color: #2c4128;
            min-height: 100vh;
        }

        /* soft ghibli container */
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(253, 249, 235, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2.2rem;
            padding: 1.2rem 1rem 1.8rem;
            box-shadow: 0 12px 28px rgba(40, 55, 25, 0.2);
            border: 1px solid #f3e5c2;
        }

        /* header */
        .header-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.4rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px dashed #d8c894;
        }

        h1 {
            font-size: 1.65rem;
            font-weight: 650;
            background: linear-gradient(130deg, #437a38, #9c7842);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .date-badge {
            background: #fef2da;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-family: monospace;
            font-weight: 500;
            font-size: 0.7rem;
            color: #5f4a2c;
            box-shadow: inset 0 0 0 1px #ffefbc;
            white-space: nowrap;
        }

        .token-bar {
            background: #ece1b6;
            border-radius: 2rem;
            padding: 0.25rem 1rem;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
        }

        .token-bar span:first-child {
            font-size: 1rem;
        }

        /* roles grid - mobile 2 columns */
        .roles-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.9rem;
            margin: 1.2rem 0 1.4rem;
        }

        /* smaller tiles */
        .role-card {
            background: #fffcf0;
            border-radius: 1.5rem;
            padding: 0.8rem 0.7rem 1rem;
            transition: transform 0.1s ease;
            box-shadow: 0 6px 12px rgba(60, 45, 20, 0.1);
            border: 1px solid #f2e2bf;
            display: flex;
            flex-direction: column;
        }

        .role-card:active {
            transform: scale(0.99);
        }

        .role-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #457a39;
            border-left: 4px solid #e2b87a;
            padding-left: 0.5rem;
            margin-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .role-title span {
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: #ddce9f;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #3b592e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .icon-btn:active {
            transform: scale(0.92);
            background: #c8b473;
        }

        .task-list {
            list-style: none;
            margin: 0.3rem 0 0.4rem;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fef7ea;
            margin: 0.35rem 0;
            padding: 0.3rem 0.5rem;
            border-radius: 40px;
            gap: 5px;
            font-size: 0.75rem;
        }

        .task-text {
            flex: 2;
            font-weight: 500;
            font-size: 0.75rem;
            word-break: break-word;
            cursor: pointer;
            transition: 0.05s;
            line-height: 1.3;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #8aa97a;
            font-style: italic;
        }

        .token-badge {
            background: #f0e5ca;
            border-radius: 30px;
            font-size: 0.6rem;
            padding: 0.1rem 0.5rem;
            white-space: nowrap;
            font-weight: bold;
        }

        .delete-task-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #bc8864;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }

        .delete-task-btn:active {
            background: #eedcbb;
        }

        /* mastery progress compact */
        .role-mastery {
            margin-top: 0.6rem;
            background: #eaddbc;
            border-radius: 30px;
            padding: 0.2rem 0.5rem;
        }

        .progress-label {
            font-size: 0.6rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .progress-bar-bg {
            background: #cfbf91;
            border-radius: 30px;
            height: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background: #5f8b4a;
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.2s ease;
        }

        .empty-tasks-hint {
            text-align: center;
            font-size: 0.7rem;
            color: #ab956b;
            padding: 0.3rem 0;
            font-style: italic;
        }

        /* summary section */
        .summary-section {
            background: #e7dfc6cc;
            border-radius: 1.6rem;
            padding: 1rem 1.2rem;
            margin-top: 0.8rem;
        }

        .summary-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.6rem;
            display: flex;
            gap: 6px;
        }

        textarea {
            width: 100%;
            padding: 0.7rem;
            border-radius: 1.3rem;
            border: 1px solid #cfbc8a;
            background: #fffff2;
            font-family: inherit;
            font-size: 0.8rem;
            resize: vertical;
        }

        .sleep-btn {
            background: #6d944f;
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.5rem 1.4rem;
            border-radius: 3rem;
            margin-top: 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
        }

        .sleep-btn:active {
            background: #4c7035;
            transform: scale(0.97);
        }

        /* dopamine toast */
        .toast-token {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f8efcb;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: bold;
            color: #367c26;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.2);
            animation: floatFade 1.2s forwards;
            pointer-events: none;
            z-index: 200;
            font-size: 0.85rem;
            white-space: nowrap;
            font-family: monospace;
        }

        @keyframes floatFade {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(15px);
            }
            20% {
                opacity: 1;
                transform: translateX(-50%) translateY(0px);
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-35px);
            }
        }

        /* sleep dim overlay */
        .sleep-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(25, 35, 12, 0.94), rgba(2, 8, 0, 0.98));
            backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }

        .sleep-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sleep-message-card {
            background: #faf0cf;
            padding: 1.3rem 1.5rem;
            border-radius: 2.2rem;
            font-size: 1.2rem;
            max-width: 85%;
            text-align: center;
            font-weight: 500;
            color: #3d612b;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #fff0bc;
            animation: softAppear 0.5s forwards;
            line-height: 1.4;
        }

        @keyframes softAppear {
            0% {
                transform: scale(0.92);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tiny-note {
            text-align: center;
            font-size: 0.6rem;
            margin-top: 0.6rem;
            color: #7b6842;
        }

        button {
            cursor: pointer;
            background: none;
        }

        /* scroll custom */
        .task-list::-webkit-scrollbar {
            width: 3px;
        }
    </style>
</head>
<body>
<div class="container" id="appContainer">
    <div class="header-area">
        <h1>🍃  Role-Keeper  🍂</h1>
        <div style="display: flex; gap: 8px; align-items: center;">
            <div class="date-badge" id="liveDate"></div>
            <div class="token-bar"><span>✨</span> <span id="totalTokenDisplay">0</span></div>
        </div>
    </div>

    <div class="roles-grid" id="rolesGrid"></div>

    <div class="summary-section">
        <div class="summary-title">📖  Nightfall Journal</div>
        <textarea id="dailySummary" rows="2" placeholder="Write a closing thought, a whisper of gratitude..."></textarea>
        <button class="sleep-btn" id="sleepTriggerBtn">🌙  Rest & Summarize  🌙</button>
        <div class="tiny-note">✨ tap task → mark done → earn 1–5 random tokens (once per task)</div>
    </div>
</div>

<script>
    // ---------- ROLE DEFINITIONS (predefined tasks per role) ----------
    const ROLE_PREDEFINED_MAP = {
        "Assistant Manager": ["Review priorities", "Team alignment", "Update board", "Delegate 1 task"],
        "Guzheng Master": ["Practice 30min scales", "Learn new phrase", "Record melody", "Listen to masters"],
        "Lyre Master": ["Tune lyre", "Finger warmup", "Learn hymn", "Improvise 10min"],
        "Cook": ["Plan today's dish", "Prep ingredients", "Cook with intention", "Taste & adjust"]
    };

    // Global state
    let globalTokens = 0;
    let rolesData = [];      // { roleName, tasks: [ { id, text, done, tokenClaimed, isCustom } ] }
    let currentDateKey = "";

    // Helper: format date "Web, 2025 04 21 18:30"
    function getFormattedDate() {
        const now = new Date();
        const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const dayName = days[now.getDay()];
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        return `${dayName}, ${year} ${month} ${day} ${hours}:${minutes}`;
    }

    function getCurrentDateKey() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function rollToken() { return Math.floor(Math.random() * 5) + 1; }

    function showDopamineMessage(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast-token';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1300);
    }

    function updateTotalUI() {
        document.getElementById('totalTokenDisplay').innerText = globalTokens;
    }

    // compute role mastery % based on completed tasks
    function computeRoleMastery(role) {
        const tasks = role.tasks;
        if (!tasks.length) return 0;
        const completedCount = tasks.filter(t => t.done === true).length;
        return Math.floor((completedCount / tasks.length) * 100);
    }

    function persistAll() {
        const storage = {
            dateKey: currentDateKey,
            tokens: globalTokens,
            rolesData: rolesData,
            summaryText: document.getElementById('dailySummary')?.value || ""
        };
        localStorage.setItem("ghibli_role_v2", JSON.stringify(storage));
    }

    // Toggle task done + token reward (only once)
    function toggleTask(roleIdx, taskId) {
        const role = rolesData[roleIdx];
        const task = role.tasks.find(t => t.id === taskId);
        if (!task) return;
        const wasDone = task.done;
        if (!wasDone) {
            task.done = true;
            if (!task.tokenClaimed) {
                const earned = rollToken();
                globalTokens += earned;
                task.tokenClaimed = true;
                updateTotalUI();
                showDopamineMessage(`🎉 +${earned} tokens! (${task.text.substring(0, 20)})`);
            }
        } else {
            // uncheck: tokens remain claimed, no refund
            task.done = false;
        }
        persistAll();
        renderRolesGrid();
    }

    // Add custom task (flexibility button)
    function addCustomTask(roleIdx) {
        const customName = prompt("✨ Add new task:", "e.g., 'water plants'");
        if (!customName || customName.trim() === "") return;
        const newTask = {
            id: Date.now() + Math.random() * 10000 + roleIdx,
            text: customName.trim(),
            done: false,
            tokenClaimed: false,
            isCustom: true
        };
        rolesData[roleIdx].tasks.push(newTask);
        persistAll();
        renderRolesGrid();
        showDopamineMessage(`➕ added: "${customName.trim()}"`);
    }

    // Delete task
    function deleteTask(roleIdx, taskId) {
        const role = rolesData[roleIdx];
        const taskIndex = role.tasks.findIndex(t => t.id === taskId);
        if (taskIndex === -1) return;
        const taskName = role.tasks[taskIndex].text;
        if (confirm(`Delete "${taskName}"?`)) {
            role.tasks.splice(taskIndex, 1);
            persistAll();
            renderRolesGrid();
            showDopamineMessage(`🗑️ removed: ${taskName}`);
        }
    }

    // Import predefined tasks (avoid duplicates)
    function importPredefinedTasks(roleIdx) {
        const role = rolesData[roleIdx];
        const predefinedList = ROLE_PREDEFINED_MAP[role.roleName] || [];
        if (!predefinedList.length) {
            alert("No default tasks for this role.");
            return;
        }
        let added = 0;
        for (let preText of predefinedList) {
            const exists = role.tasks.some(t => t.text.toLowerCase() === preText.toLowerCase());
            if (!exists) {
                role.tasks.push({
                    id: Date.now() + Math.random() * 10000 + roleIdx + preText.length,
                    text: preText,
                    done: false,
                    tokenClaimed: false,
                    isCustom: false
                });
                added++;
            }
        }
        if (added) {
            persistAll();
            renderRolesGrid();
            showDopamineMessage(`📦 imported ${added} tasks for ${role.roleName}`);
        } else {
            alert("All default tasks already exist ✨");
        }
    }

    // render grid: 2 columns mobile-first
    function renderRolesGrid() {
        const grid = document.getElementById('rolesGrid');
        if (!grid) return;
        grid.innerHTML = '';
        for (let rIdx = 0; rIdx < rolesData.length; rIdx++) {
            const role = rolesData[rIdx];
            const masteryPercent = computeRoleMastery(role);
            const card = document.createElement('div');
            card.className = 'role-card';
            
            // header with title + buttons
            const headerDiv = document.createElement('div');
            headerDiv.className = 'role-title';
            const titleSpan = document.createElement('span');
            titleSpan.innerText = role.roleName.length > 14 ? role.roleName.slice(0,12)+".." : role.roleName;
            titleSpan.title = role.roleName;
            const btnGrp = document.createElement('div');
            btnGrp.className = 'btn-group';
            
            const importBtn = document.createElement('button');
            importBtn.innerText = '📋';
            importBtn.className = 'icon-btn';
            importBtn.title = 'Import default tasks';
            importBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                importPredefinedTasks(rIdx);
            });
            
            const addBtn = document.createElement('button');
            addBtn.innerText = '+';
            addBtn.className = 'icon-btn';
            addBtn.title = 'Add custom task';
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                addCustomTask(rIdx);
            });
            
            btnGrp.appendChild(importBtn);
            btnGrp.appendChild(addBtn);
            headerDiv.appendChild(titleSpan);
            headerDiv.appendChild(btnGrp);
            card.appendChild(headerDiv);
            
            // task list
            const taskUl = document.createElement('ul');
            taskUl.className = 'task-list';
            if (role.tasks.length === 0) {
                const emptyMsg = document.createElement('li');
                emptyMsg.className = 'empty-tasks-hint';
                emptyMsg.innerText = '✨ + to add / 📋 import';
                taskUl.appendChild(emptyMsg);
            } else {
                role.tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = 'task-item';
                    const taskSpan = document.createElement('span');
                    taskSpan.className = `task-text ${task.done ? 'completed' : ''}`;
                    taskSpan.innerText = task.text;
                    taskSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleTask(rIdx, task.id);
                    });
                    const tokenSpan = document.createElement('span');
                    tokenSpan.className = 'token-badge';
                    if (task.tokenClaimed) tokenSpan.innerHTML = '🎁';
                    else if (task.done) tokenSpan.innerHTML = '💫';
                    else tokenSpan.innerHTML = '⚡';
                    
                    const delBtn = document.createElement('button');
                    delBtn.innerText = '✕';
                    delBtn.className = 'delete-task-btn';
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteTask(rIdx, task.id);
                    });
                    li.appendChild(taskSpan);
                    li.appendChild(tokenSpan);
                    li.appendChild(delBtn);
                    taskUl.appendChild(li);
                });
            }
            card.appendChild(taskUl);
            
            // mastery progress bar (shows 0/25/50/100 flavor)
            let levelLabel = '';
            if (masteryPercent === 0) levelLabel = '🌱 0%';
            else if (masteryPercent <= 25) levelLabel = '🍂 25%';
            else if (masteryPercent <= 50) levelLabel = '🍁 50%';
            else if (masteryPercent < 100) levelLabel = '🌸 75%';
            else levelLabel = '🌟 100%';
            
            const masteryDiv = document.createElement('div');
            masteryDiv.className = 'role-mastery';
            masteryDiv.innerHTML = `
                <div class="progress-label"><span>✨ mastery</span><span>${masteryPercent}% (${levelLabel.split(' ')[1]})</span></div>
                <div class="progress-bar-bg"><div class="progress-fill" style="width: ${masteryPercent}%;"></div></div>
            `;
            card.appendChild(masteryDiv);
            grid.appendChild(card);
        }
    }
    
    // Sleep dim & random encouraging sentence
    function sleepAndDim() {
        const summaryText = document.getElementById('dailySummary').value.trim();
        if (summaryText === "") {
            alert("🌙 Write a closing thought before resting... 🌙");
            return;
        }
        persistAll();
        const messages = [
            "💤 The forest sighs with you. Rest now, gentle star.",
            "🍃 Even Totoro naps. Your spirit did well today.",
            "🌙 Let stardust carry you into dream. Tomorrow awaits.",
            "🌸 Every completed task is a petal in your garden. Good night.",
            "✨ Soot sprites whisper: well done, keeper. Sleep peacefully.",
            "🍲 Warm tea and quiet mind — rest after a meaningful day.",
            "🎑 Your tokens glow like fireflies. Drift into slumber.",
            "🐉 Calcifer murmurs: 'Good spark, rest now.'"
        ];
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        let overlay = document.querySelector('.sleep-overlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.className = 'sleep-overlay';
            document.body.appendChild(overlay);
        }
        overlay.innerHTML = `<div class="sleep-message-card">🎐 ${randomMsg} 🎐</div>`;
        overlay.classList.add('active');
        overlay.addEventListener('click', function onOverlayTap() {
            overlay.classList.remove('active');
            overlay.removeEventListener('click', onOverlayTap);
        });
    }
    
    // Date detection & localStorage init (reset on new day)
    function initDataAndCache() {
        const todayKey = getCurrentDateKey();
        const raw = localStorage.getItem("ghibli_role_v2");
        let needsFresh = false;
        if (raw) {
            try {
                const cached = JSON.parse(raw);
                if (cached.dateKey !== todayKey) {
                    needsFresh = true;
                } else {
                    currentDateKey = cached.dateKey;
                    globalTokens = cached.tokens || 0;
                    rolesData = cached.rolesData;
                    const summaryArea = document.getElementById('dailySummary');
                    if (summaryArea && cached.summaryText !== undefined) summaryArea.value = cached.summaryText;
                    updateTotalUI();
                    renderRolesGrid();
                    return;
                }
            } catch(e) { needsFresh = true; }
        } else {
            needsFresh = true;
        }
        if (needsFresh) {
            globalTokens = 0;
            currentDateKey = todayKey;
            const baseNames = ["Assistant Manager", "Guzheng Master", "Lyre Master", "Cook"];
            rolesData = baseNames.map(name => ({
                roleName: name,
                tasks: []      // empty; user imports or adds manually (no default clutter)
            }));
            const summaryField = document.getElementById('dailySummary');
            if (summaryField) summaryField.value = "";
            persistAll();
            updateTotalUI();
            renderRolesGrid();
        }
    }
    
    function updateClock() {
        const dateElem = document.getElementById('liveDate');
        if (dateElem) dateElem.innerText = getFormattedDate();
    }
    
    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
        initDataAndCache();
        updateClock();
        setInterval(updateClock, 60000);
        const sleepBtn = document.getElementById('sleepTriggerBtn');
        if (sleepBtn) sleepBtn.addEventListener('click', sleepAndDim);
        const summaryArea = document.getElementById('dailySummary');
        summaryArea.addEventListener('input', () => persistAll());
    });
</script>
</body>
</html>
