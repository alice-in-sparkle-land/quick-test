<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Spirit Keeper · Ghibli Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #cde2cd 0%, #b1cfaa 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Hiragino Kaku Gothic ProN', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 1rem 0.9rem 2rem;
            color: #2c4128;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(253, 249, 235, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2.2rem;
            padding: 1.2rem 1rem 1.8rem;
            box-shadow: 0 12px 28px rgba(40, 55, 25, 0.2);
            border: 1px solid #f3e5c2;
        }

        /* header */
        .header-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px dashed #d8c894;
        }

        h1 {
            font-size: 1.65rem;
            font-weight: 650;
            background: linear-gradient(130deg, #437a38, #9c7842);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .date-badge {
            background: #fef2da;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-family: monospace;
            font-weight: 500;
            font-size: 0.7rem;
            color: #5f4a2c;
            white-space: nowrap;
        }

        .token-bar {
            background: #ece1b6;
            border-radius: 2rem;
            padding: 0.25rem 1rem;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* action bar for import/export/add role */
        .action-bar {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ghibli-btn {
            background: #ddce9f;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #3b592e;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }

        .ghibli-btn:active {
            transform: scale(0.96);
            background: #c8b473;
        }

        /* roles grid - 2 columns mobile */
        .roles-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.9rem;
            margin: 1rem 0 1.2rem;
        }

        .role-card {
            background: #fffcf0;
            border-radius: 1.5rem;
            padding: 0.8rem 0.7rem 1rem;
            transition: transform 0.1s ease;
            box-shadow: 0 6px 12px rgba(60, 45, 20, 0.1);
            border: 1px solid #f2e2bf;
            display: flex;
            flex-direction: column;
        }

        .role-title {
            font-size: 1rem;
            font-weight: 700;
            color: #457a39;
            border-left: 4px solid #e2b87a;
            padding-left: 0.5rem;
            margin-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .role-title span {
            font-size: 0.9rem;
            word-break: break-word;
            flex: 1;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: #ddce9f;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #3b592e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .icon-btn:active {
            transform: scale(0.92);
            background: #c8b473;
        }

        .delete-role-btn {
            background: #e7c2a3;
            color: #9b5a3a;
        }

        .task-list {
            list-style: none;
            margin: 0.3rem 0 0.4rem;
            max-height: 170px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fef7ea;
            margin: 0.35rem 0;
            padding: 0.3rem 0.5rem;
            border-radius: 40px;
            gap: 5px;
            font-size: 0.75rem;
        }

        .task-text {
            flex: 2;
            font-weight: 500;
            font-size: 0.75rem;
            word-break: break-word;
            cursor: pointer;
            line-height: 1.3;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #8aa97a;
            font-style: italic;
        }

        .token-badge {
            background: #f0e5ca;
            border-radius: 30px;
            font-size: 0.6rem;
            padding: 0.1rem 0.5rem;
            white-space: nowrap;
            font-weight: bold;
        }

        .delete-task-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #bc8864;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }

        .delete-task-btn:active {
            background: #eedcbb;
        }

        .role-mastery {
            margin-top: 0.6rem;
            background: #eaddbc;
            border-radius: 30px;
            padding: 0.2rem 0.5rem;
        }

        .progress-label {
            font-size: 0.6rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .progress-bar-bg {
            background: #cfbf91;
            border-radius: 30px;
            height: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background: #5f8b4a;
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.2s ease;
        }

        .empty-tasks-hint {
            text-align: center;
            font-size: 0.65rem;
            color: #ab956b;
            padding: 0.3rem 0;
            font-style: italic;
        }

        .summary-section {
            background: #e7dfc6cc;
            border-radius: 1.6rem;
            padding: 1rem 1.2rem;
            margin-top: 0.8rem;
        }

        .summary-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.6rem;
        }

        textarea {
            width: 100%;
            padding: 0.7rem;
            border-radius: 1.3rem;
            border: 1px solid #cfbc8a;
            background: #fffff2;
            font-family: inherit;
            font-size: 0.8rem;
            resize: vertical;
        }

        .sleep-btn {
            background: #6d944f;
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.5rem 1.4rem;
            border-radius: 3rem;
            margin-top: 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
        }

        .sleep-btn:active {
            background: #4c7035;
            transform: scale(0.97);
        }

        .toast-token {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f8efcb;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: bold;
            color: #367c26;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.2);
            animation: floatFade 1.2s forwards;
            pointer-events: none;
            z-index: 200;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        @keyframes floatFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(15px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0px); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-35px); }
        }

        .sleep-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(25, 35, 12, 0.94), rgba(2, 8, 0, 0.98));
            backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }

        .sleep-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sleep-message-card {
            background: #faf0cf;
            padding: 1.3rem 1.5rem;
            border-radius: 2.2rem;
            font-size: 1.2rem;
            max-width: 85%;
            text-align: center;
            font-weight: 500;
            color: #3d612b;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.5);
            animation: softAppear 0.5s forwards;
        }

        @keyframes softAppear {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tiny-note {
            text-align: center;
            font-size: 0.6rem;
            margin-top: 0.6rem;
            color: #7b6842;
        }

        input, textarea, button { font-family: inherit; }
    </style>
</head>
<body>
<div class="container" id="appContainer">
    <div class="header-area">
        <h1>🍃 Role-Keeper 🍂</h1>
        <div style="display: flex; gap: 8px; align-items: center;">
            <div class="date-badge" id="liveDate"></div>
            <div class="token-bar"><span>✨</span> <span id="totalTokenDisplay">0</span></div>
        </div>
    </div>

    <div class="action-bar">
        <button class="ghibli-btn" id="addRoleBtn">➕ New Role</button>
        <button class="ghibli-btn" id="exportDataBtn">📤 Export</button>
        <button class="ghibli-btn" id="importDataBtn">📥 Import</button>
    </div>

    <div class="roles-grid" id="rolesGrid"></div>

    <div class="summary-section">
        <div class="summary-title">📖 Nightfall Journal</div>
        <textarea id="dailySummary" rows="2" placeholder="Write a closing thought, a whisper of gratitude..."></textarea>
        <button class="sleep-btn" id="sleepTriggerBtn">🌙 Rest & Summarize 🌙</button>
        <div class="tiny-note">✨ tap task → mark done → earn 1–5 tokens (once per task) | ✕ delete task instantly</div>
    </div>
</div>

<script>
    // ---------- DEFAULT PREDEFINED TASKS FOR NEW ROLES ----------
    const DEFAULT_PREDEFINED_MAP = {
        "Assistant Manager": ["Review priorities", "Team alignment", "Update board", "Delegate 1 task"],
        "Guzheng Master": ["Practice 30min scales", "Learn new phrase", "Record melody", "Listen to masters"],
        "Lyre Master": ["Tune lyre", "Finger warmup", "Learn hymn", "Improvise 10min"],
        "Cook": ["Plan today's dish", "Prep ingredients", "Cook with intention", "Taste & adjust"]
    };

    // Global state
    let globalTokens = 0;
    let rolesData = [];      // { roleName, tasks: [ { id, text, done, tokenClaimed, isCustom } ] }
    let currentDateKey = "";

    // Helper: format date
    function getFormattedDate() {
        const now = new Date();
        const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const dayName = days[now.getDay()];
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        return `${dayName}, ${year} ${month} ${day} ${hours}:${minutes}`;
    }

    function getCurrentDateKey() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function rollToken() { return Math.floor(Math.random() * 5) + 1; }

    function showDopamineMessage(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast-token';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1300);
    }

    function updateTotalUI() {
        document.getElementById('totalTokenDisplay').innerText = globalTokens;
    }

    function computeRoleMastery(role) {
        const tasks = role.tasks;
        if (!tasks.length) return 0;
        const completedCount = tasks.filter(t => t.done === true).length;
        return Math.floor((completedCount / tasks.length) * 100);
    }

    function persistAll() {
        const storage = {
            dateKey: currentDateKey,
            tokens: globalTokens,
            rolesData: rolesData,
            summaryText: document.getElementById('dailySummary')?.value || ""
        };
        localStorage.setItem("ghibli_role_v3", JSON.stringify(storage));
    }

    // Toggle task done + token reward once
    function toggleTask(roleIdx, taskId) {
        const role = rolesData[roleIdx];
        const task = role.tasks.find(t => t.id === taskId);
        if (!task) return;
        if (!task.done) {
            task.done = true;
            if (!task.tokenClaimed) {
                const earned = rollToken();
                globalTokens += earned;
                task.tokenClaimed = true;
                updateTotalUI();
                showDopamineMessage(`🎉 +${earned} tokens! (${task.text.substring(0, 20)})`);
            }
        } else {
            task.done = false;  // untick, but token stays claimed (no refund)
        }
        persistAll();
        renderRolesGrid();
    }

    // Add custom task to a role
    function addCustomTask(roleIdx) {
        const customName = prompt("✨ Add new daily task:", "e.g., 'water plants'");
        if (!customName || customName.trim() === "") return;
        const newTask = {
            id: Date.now() + Math.random() * 10000 + roleIdx,
            text: customName.trim(),
            done: false,
            tokenClaimed: false,
            isCustom: true
        };
        rolesData[roleIdx].tasks.push(newTask);
        persistAll();
        renderRolesGrid();
        showDopamineMessage(`➕ added: "${customName.trim()}"`);
    }

    // Delete task: no confirmation
    function deleteTask(roleIdx, taskId) {
        const role = rolesData[roleIdx];
        const taskIndex = role.tasks.findIndex(t => t.id === taskId);
        if (taskIndex === -1) return;
        role.tasks.splice(taskIndex, 1);
        persistAll();
        renderRolesGrid();
        showDopamineMessage(`🗑️ task removed`);
    }

    // Import predefined tasks for a role (avoid duplicates)
    function importPredefinedTasks(roleIdx) {
        const role = rolesData[roleIdx];
        const predefinedList = DEFAULT_PREDEFINED_MAP[role.roleName] || [];
        if (!predefinedList.length) {
            // fallback: generic tasks if role name not in default map
            const fallback = ["Morning intention", "Focus session", "Reflect", "Evening gratitude"];
            for (let t of fallback) {
                if (!role.tasks.some(rt => rt.text.toLowerCase() === t.toLowerCase())) {
                    role.tasks.push({
                        id: Date.now() + Math.random() * 10000 + t.length,
                        text: t,
                        done: false,
                        tokenClaimed: false,
                        isCustom: false
                    });
                }
            }
            persistAll();
            renderRolesGrid();
            showDopamineMessage(`📦 imported fallback tasks`);
            return;
        }
        let added = 0;
        for (let preText of predefinedList) {
            const exists = role.tasks.some(t => t.text.toLowerCase() === preText.toLowerCase());
            if (!exists) {
                role.tasks.push({
                    id: Date.now() + Math.random() * 10000 + preText.length,
                    text: preText,
                    done: false,
                    tokenClaimed: false,
                    isCustom: false
                });
                added++;
            }
        }
        if (added) {
            persistAll();
            renderRolesGrid();
            showDopamineMessage(`📦 imported ${added} tasks for ${role.roleName}`);
        } else {
            showDopamineMessage(`✨ all default tasks already exist`);
        }
    }

    // Add a brand new role (with optional custom name and predefined tasks prompt)
    function addNewRole() {
        let roleName = prompt("Enter new role name:", "e.g., 'Garden Keeper'");
        if (!roleName || roleName.trim() === "") return;
        roleName = roleName.trim();
        // Check duplicate
        if (rolesData.some(r => r.roleName.toLowerCase() === roleName.toLowerCase())) {
            alert("Role already exists!");
            return;
        }
        const newRole = {
            roleName: roleName,
            tasks: []
        };
        rolesData.push(newRole);
        // ask if user wants to import predefined tasks for this new role
        const wantPredefined = confirm(`Add default task set for "${roleName}"? (You can import later via 📋)`);
        if (wantPredefined) {
            // try to use default map if name matches common, else generic
            const genericDefault = ["Daily focus", "Small win", "Mindful moment", "Evening reflection"];
            const matched = DEFAULT_PREDEFINED_MAP[roleName] || genericDefault;
            for (let t of matched) {
                newRole.tasks.push({
                    id: Date.now() + Math.random() * 10000 + t.length,
                    text: t,
                    done: false,
                    tokenClaimed: false,
                    isCustom: false
                });
            }
            showDopamineMessage(`✨ added "${roleName}" with ${matched.length} tasks`);
        } else {
            showDopamineMessage(`✨ added empty role "${roleName}"`);
        }
        persistAll();
        renderRolesGrid();
    }

    // Delete entire role (no confirmation for smoothness, but safe with confirm once)
    function deleteRole(roleIdx) {
        const roleName = rolesData[roleIdx].roleName;
        if (confirm(`Delete entire role "${roleName}" and all its tasks?`)) {
            rolesData.splice(roleIdx, 1);
            persistAll();
            renderRolesGrid();
            showDopamineMessage(`🗑️ role removed: ${roleName}`);
        }
    }

    // Export all data (roles, tokens, summary) to JSON file
    function exportData() {
        const exportObj = {
            version: "1.0",
            exportDate: new Date().toISOString(),
            tokens: globalTokens,
            rolesData: rolesData,
            summaryText: document.getElementById('dailySummary')?.value || "",
            dateKey: currentDateKey
        };
        const dataStr = JSON.stringify(exportObj, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ghibli-tracker-${getFormattedDate().replace(/[, :]/g, '-')}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showDopamineMessage("📁 Export complete!");
    }

    // Import data from JSON file (merge or replace)
    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (imported.rolesData && Array.isArray(imported.rolesData)) {
                        // Replace current data with imported (full restore)
                        rolesData = imported.rolesData;
                        globalTokens = typeof imported.tokens === 'number' ? imported.tokens : 0;
                        currentDateKey = getCurrentDateKey(); // keep current date fresh, but preserve tokens and tasks for today
                        // Overwrite summary
                        const summaryField = document.getElementById('dailySummary');
                        if (summaryField && imported.summaryText !== undefined) summaryField.value = imported.summaryText;
                        // important: reset any dateKey mismatches? just preserve imported but we keep current day to avoid confusion
                        // Ensure each task has required fields (migration)
                        for (let role of rolesData) {
                            if (!role.tasks) role.tasks = [];
                            for (let task of role.tasks) {
                                if (task.tokenClaimed === undefined) task.tokenClaimed = false;
                                if (task.done === undefined) task.done = false;
                                if (!task.id) task.id = Date.now() + Math.random();
                            }
                        }
                        persistAll();
                        updateTotalUI();
                        renderRolesGrid();
                        showDopamineMessage("📥 Import successful! Roles restored.");
                    } else {
                        alert("Invalid file: missing rolesData.");
                    }
                } catch (err) {
                    alert("Error parsing file: " + err.message);
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    // Render roles grid (2 columns)
    function renderRolesGrid() {
        const grid = document.getElementById('rolesGrid');
        if (!grid) return;
        grid.innerHTML = '';
        for (let rIdx = 0; rIdx < rolesData.length; rIdx++) {
            const role = rolesData[rIdx];
            const masteryPercent = computeRoleMastery(role);
            const card = document.createElement('div');
            card.className = 'role-card';
            
            const headerDiv = document.createElement('div');
            headerDiv.className = 'role-title';
            const titleSpan = document.createElement('span');
            titleSpan.innerText = role.roleName;
            titleSpan.title = role.roleName;
            const btnGrp = document.createElement('div');
            btnGrp.className = 'btn-group';
            
            const importBtn = document.createElement('button');
            importBtn.innerText = '📋';
            importBtn.className = 'icon-btn';
            importBtn.title = 'Import default tasks';
            importBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                importPredefinedTasks(rIdx);
            });
            
            const addBtn = document.createElement('button');
            addBtn.innerText = '+';
            addBtn.className = 'icon-btn';
            addBtn.title = 'Add custom task';
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                addCustomTask(rIdx);
            });
            
            const delRoleBtn = document.createElement('button');
            delRoleBtn.innerText = '🗑';
            delRoleBtn.className = 'icon-btn delete-role-btn';
            delRoleBtn.title = 'Delete role';
            delRoleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteRole(rIdx);
            });
            
            btnGrp.appendChild(importBtn);
            btnGrp.appendChild(addBtn);
            btnGrp.appendChild(delRoleBtn);
            headerDiv.appendChild(titleSpan);
            headerDiv.appendChild(btnGrp);
            card.appendChild(headerDiv);
            
            const taskUl = document.createElement('ul');
            taskUl.className = 'task-list';
            if (role.tasks.length === 0) {
                const emptyMsg = document.createElement('li');
                emptyMsg.className = 'empty-tasks-hint';
                emptyMsg.innerText = '✨ + to add / 📋 import';
                taskUl.appendChild(emptyMsg);
            } else {
                role.tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = 'task-item';
                    const taskSpan = document.createElement('span');
                    taskSpan.className = `task-text ${task.done ? 'completed' : ''}`;
                    taskSpan.innerText = task.text;
                    taskSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleTask(rIdx, task.id);
                    });
                    const tokenSpan = document.createElement('span');
                    tokenSpan.className = 'token-badge';
                    if (task.tokenClaimed) tokenSpan.innerHTML = '🎁';
                    else if (task.done) tokenSpan.innerHTML = '💫';
                    else tokenSpan.innerHTML = '⚡';
                    
                    const delBtn = document.createElement('button');
                    delBtn.innerText = '✕';
                    delBtn.className = 'delete-task-btn';
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteTask(rIdx, task.id);
                    });
                    li.appendChild(taskSpan);
                    li.appendChild(tokenSpan);
                    li.appendChild(delBtn);
                    taskUl.appendChild(li);
                });
            }
            card.appendChild(taskUl);
            
            let levelText = '';
            if (masteryPercent === 0) levelText = '0%';
            else if (masteryPercent <= 25) levelText = '25%';
            else if (masteryPercent <= 50) levelText = '50%';
            else if (masteryPercent < 100) levelText = '75%';
            else levelText = '100%';
            
            const masteryDiv = document.createElement('div');
            masteryDiv.className = 'role-mastery';
            masteryDiv.innerHTML = `
                <div class="progress-label"><span>✨ mastery</span><span>${masteryPercent}% (${levelText})</span></div>
                <div class="progress-bar-bg"><div class="progress-fill" style="width: ${masteryPercent}%;"></div></div>
            `;
            card.appendChild(masteryDiv);
            grid.appendChild(card);
        }
    }
    
    // Sleep dim
    function sleepAndDim() {
        const summaryText = document.getElementById('dailySummary').value.trim();
        if (summaryText === "") {
            alert("🌙 Write a closing thought before resting... 🌙");
            return;
        }
        persistAll();
        const messages = [
            "💤 The forest sighs with you. Rest now, gentle star.",
            "🍃 Even Totoro naps. Your spirit did well today.",
            "🌙 Let stardust carry you into dream. Tomorrow awaits.",
            "🌸 Every completed task is a petal in your garden. Good night.",
            "✨ Soot sprites whisper: well done, keeper. Sleep peacefully.",
            "🍲 Warm tea and quiet mind — rest after a meaningful day.",
            "🎑 Your tokens glow like fireflies. Drift into slumber."
        ];
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        let overlay = document.querySelector('.sleep-overlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.className = 'sleep-overlay';
            document.body.appendChild(overlay);
        }
        overlay.innerHTML = `<div class="sleep-message-card">🎐 ${randomMsg} 🎐</div>`;
        overlay.classList.add('active');
        overlay.addEventListener('click', function onTap() {
            overlay.classList.remove('active');
            overlay.removeEventListener('click', onTap);
        });
    }
    
    // Initialize with local cache & date reset
    function initDataAndCache() {
        const todayKey = getCurrentDateKey();
        const raw = localStorage.getItem("ghibli_role_v3");
        if (raw) {
            try {
                const cached = JSON.parse(raw);
                if (cached.dateKey !== todayKey) {
                    // new day: keep roles structure but reset completions and tokens
                    globalTokens = 0;
                    currentDateKey = todayKey;
                    rolesData = cached.rolesData;
                    // Reset all tasks (done=false, tokenClaimed=false) but preserve task texts
                    for (let role of rolesData) {
                        if (role.tasks) {
                            for (let task of role.tasks) {
                                task.done = false;
                                task.tokenClaimed = false;
                            }
                        } else {
                            role.tasks = [];
                        }
                    }
                    const summaryField = document.getElementById('dailySummary');
                    if (summaryField) summaryField.value = "";
                    persistAll();
                } else {
                    currentDateKey = cached.dateKey;
                    globalTokens = cached.tokens || 0;
                    rolesData = cached.rolesData;
                    const summaryField = document.getElementById('dailySummary');
                    if (summaryField && cached.summaryText !== undefined) summaryField.value = cached.summaryText;
                }
            } catch(e) { freshStart(); }
        } else {
            freshStart();
        }
        updateTotalUI();
        renderRolesGrid();
    }
    
    function freshStart() {
        globalTokens = 0;
        currentDateKey = getCurrentDateKey();
        rolesData = [
            { roleName: "Assistant Manager", tasks: [] },
            { roleName: "Guzheng Master", tasks: [] },
            { roleName: "Lyre Master", tasks: [] },
            { roleName: "Cook", tasks: [] }
        ];
        document.getElementById('dailySummary').value = "";
        persistAll();
    }
    
    function updateClock() {
        const dateElem = document.getElementById('liveDate');
        if (dateElem) dateElem.innerText = getFormattedDate();
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        initDataAndCache();
        updateClock();
        setInterval(updateClock, 60000);
        document.getElementById('sleepTriggerBtn').addEventListener('click', sleepAndDim);
        document.getElementById('addRoleBtn').addEventListener('click', addNewRole);
        document.getElementById('exportDataBtn').addEventListener('click', exportData);
        document.getElementById('importDataBtn').addEventListener('click', importData);
        const summaryArea = document.getElementById('dailySummary');
        summaryArea.addEventListener('input', () => persistAll());
    });
</script>
</body>
</html>
