<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Spirit Keeper · Foldable Roles + Grids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #cde2cd 0%, #b1cfaa 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Noto Sans', system-ui, sans-serif;
            padding: 1rem 0.9rem 2rem;
            color: #2c4128;
            min-height: 100vh;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            background: rgba(253, 249, 235, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 2.2rem;
            padding: 1.2rem 1rem 1.8rem;
            box-shadow: 0 12px 28px rgba(40, 55, 25, 0.2);
            border: 1px solid #f3e5c2;
        }

        .header-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px dashed #d8c894;
        }

        h1 {
            font-size: 1.65rem;
            font-weight: 650;
            background: linear-gradient(130deg, #437a38, #9c7842);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .date-badge {
            background: #fef2da;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #5f4a2c;
        }

        .token-bar {
            background: #ece1b6;
            border-radius: 2rem;
            padding: 0.25rem 1rem;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.1s;
        }

        .action-bar {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ghibli-btn {
            background: #ddce9f;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #3b592e;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }
        .ghibli-btn:active { transform: scale(0.96); background: #c8b473; }
        .refresh-all-btn { background: #9bb87f; }

        .roles-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1rem 0 1.2rem;
        }

        .role-card {
            background: #fffcf0;
            border-radius: 1.5rem;
            box-shadow: 0 6px 12px rgba(60, 45, 20, 0.1);
            border: 1px solid #f2e2bf;
            overflow: hidden;
            transition: all 0.1s;
        }

        .role-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0.9rem;
            background: #fffcf0;
            gap: 0.5rem;
            flex-wrap: wrap;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid #f0e4ca;
        }
        .role-header:active { background: #faf3e0; }
        .role-title-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            flex-wrap: wrap;
        }
        .collapse-icon {
            font-size: 0.9rem;
            color: #9b855a;
            width: 22px;
            text-align: center;
            font-weight: bold;
        }
        .role-name {
            font-size: 1rem;
            font-weight: 700;
            color: #457a39;
            background: #f7f0df;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
        }
        .role-name:active { background: #e8ddbb; }
        .role-stats {
            font-size: 0.7rem;
            background: #eaddbc;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: bold;
        }
        .icon-row {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            background: #ddce9f;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .icon-btn:active { transform: scale(0.92); background: #c8b473; }
        .delete-role-btn { background: #e7c2a3; color: #9b5a3a; }

        .role-content {
            padding: 0.8rem 0.9rem;
            background: #fffcf0;
            transition: all 0.2s ease;
        }
        .role-content.collapsed {
            display: none;
        }

        .quote-area {
            background: #fef7e8;
            border-radius: 1.2rem;
            padding: 0.5rem 0.8rem;
            margin-bottom: 0.8rem;
            font-style: italic;
            font-size: 0.8rem;
            color: #5f4a2c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .quote-text { flex: 1; word-break: break-word; }
        .edit-icon { font-size: 0.9rem; opacity: 0.6; }

        .time-tracker {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
            background: #f3edd9;
            padding: 0.6rem;
            border-radius: 2rem;
        }
        .minutes-display { background: white; padding: 0.2rem 0.7rem; border-radius: 2rem; font-weight: bold; font-size: 0.8rem; }
        .add-time-group { display: flex; gap: 6px; align-items: center; }
        .time-input { width: 70px; padding: 0.3rem; border-radius: 30px; border: 1px solid #cfbc8a; text-align: center; }
        .log-time-btn { background: #9bb87f; border: none; padding: 0.3rem 1rem; border-radius: 2rem; font-weight: bold; cursor: pointer; }

        /* GitHub heatmap - perfect squares */
        .heatmap-container {
            margin-top: 0.8rem;
        }
        .heatmap-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: #7c6a44;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .week-selector {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #eaddbc;
            padding: 2px 8px;
            border-radius: 30px;
        }
        .week-selector button {
            background: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 20px;
        }
        .week-selector span { font-size: 0.65rem; font-weight: bold; }
        .grid-wrapper { overflow-x: auto; padding-bottom: 4px; }
        .contribution-grid { display: inline-flex; flex-direction: column; gap: 3px; min-width: 100%; }
        .week-row { display: flex; gap: 3px; align-items: center; }
        .day-label { width: 32px; font-size: 0.6rem; color: #8b764c; text-align: right; padding-right: 6px; font-weight: 500; }
        .cells-row { display: flex; gap: 3px; }
        .contribution-cell { width: 12px; height: 12px; border-radius: 2px; background-color: #ebedf0; }
        .contribution-cell.level-0 { background-color: #ebedf0; }
        .contribution-cell.level-1 { background-color: #9be9a8; }
        .contribution-cell.level-2 { background-color: #40c463; }
        .contribution-cell.level-3 { background-color: #30a14e; }
        .contribution-cell.level-4 { background-color: #216e39; }
        .legend { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; font-size: 0.6rem; align-items: center; }
        .legend-color { width: 10px; height: 10px; border-radius: 2px; }

        /* Global section: timer + heatmap side by side */
        .global-section {
            background: #fef8ea;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #ecdcaa;
        }
        .global-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
            gap: 10px;
        }
        .timer-compact {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #eaddbc;
            padding: 0.2rem 0.8rem;
            border-radius: 3rem;
        }
        .timer-compact input { width: 55px; padding: 0.2rem; border-radius: 30px; border: none; text-align: center; font-size: 0.8rem; }
        .timer-display-sm { font-family: monospace; font-weight: bold; background: #2c4128; color: #f3e5c2; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.8rem; }
        .timer-btn-sm { background: #6d944f; border: none; border-radius: 2rem; padding: 0.2rem 0.8rem; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .stop-btn { background: #b88b5c; }

        .summary-section { background: #e7dfc6cc; border-radius: 1.6rem; padding: 1rem; margin-top: 1rem; }
        textarea { width: 100%; padding: 0.7rem; border-radius: 1.3rem; border: 1px solid #cfbc8a; background: #fffff2; font-family: inherit; font-size: 0.85rem; resize: vertical; }
        .sleep-btn { background: #6d944f; border: none; color: white; font-weight: bold; padding: 0.6rem; border-radius: 3rem; margin-top: 0.8rem; cursor: pointer; width: 100%; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(30,35,18,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-card { background: #fffaf0; max-width: 90%; width: 350px; border-radius: 2rem; padding: 1.2rem; }
        .close-modal { background: #dbbc87; border: none; padding: 0.3rem 1rem; border-radius: 2rem; margin-top: 0.8rem; cursor: pointer; }
        .toast-token { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #f8efcb; padding: 6px 16px; border-radius: 60px; font-weight: bold; color: #367c26; animation: floatFade 1.2s forwards; pointer-events: none; z-index: 200; font-size: 0.85rem; }
        @keyframes floatFade { 0% { opacity: 0; transform: translateX(-50%) translateY(15px); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-35px); } }
        .tiny-note { text-align: center; font-size: 0.6rem; margin-top: 0.6rem; color: #7b6842; }
        .welcome-empty { text-align: center; padding: 2rem; background: #faf3e2; border-radius: 1.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-area">
        <h1>🍃 Spirit Keeper · Foldable</h1>
        <div style="display: flex; gap: 8px;">
            <div class="date-badge" id="liveDate"></div>
            <div class="token-bar" id="tokenBar">✨ <span id="totalTokenDisplay">0</span></div>
        </div>
    </div>

    <div class="action-bar">
        <button class="ghibli-btn" id="addRoleBtn">➕ New Role</button>
        <button class="ghibli-btn refresh-all-btn" id="refreshAllBtn">🔄 Reset All Logs</button>
        <button class="ghibli-btn" id="exportDataBtn">📤 Export</button>
        <button class="ghibli-btn" id="importDataBtn">📥 Import</button>
    </div>

    <!-- GLOBAL SECTION -->
    <div class="global-section">
        <div class="global-header">
            <span style="font-weight: bold;">🌍 Global Focus (all roles)</span>
            <div class="timer-compact">
                <input type="number" id="globalTimerMins" value="25" step="5" style="width:60px;">
                <div id="globalTimerDisplay" class="timer-display-sm">00:00</div>
                <button id="globalTimerStart" class="timer-btn-sm">▶</button>
                <button id="globalTimerStop" class="timer-btn-sm stop-btn">⏹</button>
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; margin-bottom: 8px;">
            <div class="week-selector">
                <button id="globalDecWeeks">−</button>
                <span id="globalWeeksCount">16</span><span> weeks</span>
                <button id="globalIncWeeks">+</button>
            </div>
        </div>
        <div id="globalHeatmapContainer"></div>
        <div class="legend">
            <span>Less</span>
            <div class="legend-color" style="background:#ebedf0;"></div>
            <div class="legend-color" style="background:#9be9a8;"></div>
            <div class="legend-color" style="background:#40c463;"></div>
            <div class="legend-color" style="background:#30a14e;"></div>
            <div class="legend-color" style="background:#216e39;"></div>
            <span>More</span>
            <span style="margin-left:8px;">🔥 total: <span id="globalTotalMinutes">0</span> min</span>
        </div>
    </div>

    <!-- ROLE CARDS (foldable) -->
    <div class="roles-grid" id="rolesGrid"></div>

    <div class="summary-section">
        <textarea id="dailySummary" rows="2" placeholder="🌙 nightly reflection..."></textarea>
        <button class="sleep-btn" id="sleepTriggerBtn">🌙 Rest & Save Day 🌙</button>
        <div class="tiny-note">✨ Click role header to collapse/expand. Click name or quote to edit. Timer adds minutes to selected role.</div>
    </div>
</div>

<div id="spendModal" class="modal-overlay"><div class="modal-card">
    <div style="display:flex; justify-content:space-between;"><span>🪙 Spend Tokens</span><button class="close-modal" id="closeSpendBtn">✖</button></div>
    <div style="text-align:center;"><p>You have <strong id="spendCurrentTokens">0</strong> token</p>
    <div style="display:flex; gap:1rem; justify-content:center;"><button class="spend-btn" data-amount="10">10</button><button class="spend-btn" data-amount="30">30</button><button class="spend-btn" data-amount="50">50</button></div>
    <div id="spendLogList" style="margin-top:1rem; max-height:150px; overflow-y:auto;"></div>
</div></div>

<script>
    let globalTokens = 0;
    let rolesData = []; // each: { roleName, quote, timeLogs: [{dateKey, minutes}] }
    let journalLogs = [];
    let spendLogs = [];
    let currentDateKey = "";
    let roleWeeks = {}; // roleIdx -> weeks (12-24)
    let roleCollapsed = {}; // roleIdx -> boolean (true = collapsed)
    let globalWeeks = 16;

    let globalTimerInterval = null;
    let globalTimerSeconds = 0;

    // Helpers
    function getDateKey(date = new Date()) { return `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}`; }
    function getFormattedDate() { const now = new Date(); return `${now.toDateString()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`; }
    function getTimestamp() { return new Date().toLocaleString(); }
    function showMessage(msg) { const t=document.createElement('div'); t.className='toast-token'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),1300); }
    function updateTotalUI() { document.getElementById('totalTokenDisplay').innerText = globalTokens; }
    function getIntensity(minutes) { if(minutes===0) return 0; if(minutes<15) return 1; if(minutes<30) return 2; if(minutes<60) return 3; return 4; }

    function getDateRangeWeeks(weeksCount) {
        const today = new Date(); today.setHours(0,0,0,0);
        let monday = new Date(today);
        const dayOfWeek = today.getDay();
        const daysToMonday = (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
        monday.setDate(today.getDate() - daysToMonday);
        const startDate = new Date(monday);
        startDate.setDate(monday.getDate() - ((weeksCount-1) * 7));
        const weeks = [];
        for(let w = 0; w < weeksCount; w++) {
            const weekStart = new Date(startDate);
            weekStart.setDate(startDate.getDate() + (w * 7));
            const weekDays = [];
            for(let d = 0; d < 7; d++) {
                const dayDate = new Date(weekStart);
                dayDate.setDate(weekStart.getDate() + d);
                weekDays.push(dayDate);
            }
            weeks.push(weekDays);
        }
        return weeks;
    }

    function renderHeatmapToContainer(containerEl, dailyMinutesMap, weeksCount, showTooltip = true) {
        if(!containerEl) return;
        const weeks = getDateRangeWeeks(weeksCount);
        const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        let html = `<div class="grid-wrapper"><div class="contribution-grid">`;
        for(let row = 0; row < 7; row++) {
            html += `<div class="week-row"><div class="day-label">${dayNames[row]}</div><div class="cells-row">`;
            for(let week = 0; week < weeksCount; week++) {
                const date = weeks[week][row];
                const key = getDateKey(date);
                const minutes = dailyMinutesMap[key] || 0;
                const intensity = getIntensity(minutes);
                const title = showTooltip ? `${key}: ${minutes} min` : '';
                html += `<div class="contribution-cell level-${intensity}" title="${title}"></div>`;
            }
            html += `</div></div>`;
        }
        html += `</div></div>`;
        containerEl.innerHTML = html;
    }

    function computeGlobalDailyMinutes() {
        const map = {};
        for(let role of rolesData) {
            if(role.timeLogs) for(let log of role.timeLogs) map[log.dateKey] = (map[log.dateKey] || 0) + log.minutes;
        }
        return map;
    }

    function updateGlobalHeatmap() {
        const globalMap = computeGlobalDailyMinutes();
        const total = Object.values(globalMap).reduce((a,b)=>a+b,0);
        document.getElementById('globalTotalMinutes').innerText = total;
        const container = document.getElementById('globalHeatmapContainer');
        if(container) renderHeatmapToContainer(container, globalMap, globalWeeks, true);
    }

    function renderRoleHeatmap(roleIdx, containerId) {
        const container = document.getElementById(containerId);
        if(!container) return;
        const role = rolesData[roleIdx];
        if(!role) return;
        const roleMap = {};
        if(role.timeLogs) role.timeLogs.forEach(log => { roleMap[log.dateKey] = log.minutes; });
        const weeks = roleWeeks[roleIdx] !== undefined ? roleWeeks[roleIdx] : 16;
        renderHeatmapToContainer(container, roleMap, weeks, true);
    }

    function toggleCollapse(roleIdx) {
        roleCollapsed[roleIdx] = !roleCollapsed[roleIdx];
        const contentDiv = document.getElementById(`roleContent_${roleIdx}`);
        if(contentDiv) {
            if(roleCollapsed[roleIdx]) contentDiv.classList.add('collapsed');
            else contentDiv.classList.remove('collapsed');
        }
        const iconSpan = document.getElementById(`collapseIcon_${roleIdx}`);
        if(iconSpan) iconSpan.innerText = roleCollapsed[roleIdx] ? '▶' : '▼';
        persistAll();
    }

    function renderRolesGrid() {
        const grid = document.getElementById('rolesGrid');
        if(!grid) return;
        if(rolesData.length === 0) { grid.innerHTML = '<div class="welcome-empty">🍃 Create a role to see focus heatmaps</div>'; return; }
        grid.innerHTML = '';
        rolesData.forEach((role, idx) => {
            const todayKey = currentDateKey;
            const todayLog = role.timeLogs?.find(l=>l.dateKey===todayKey);
            const todayMinutes = todayLog ? todayLog.minutes : 0;
            const totalRoleMinutes = role.timeLogs?.reduce((a,b)=>a+b.minutes,0) || 0;
            const currentWeeks = roleWeeks[idx] !== undefined ? roleWeeks[idx] : 16;
            const isCollapsed = roleCollapsed[idx] === true;
            
            const card = document.createElement('div');
            card.className = 'role-card';
            card.innerHTML = `
                <div class="role-header" data-toggle="${idx}">
                    <div class="role-title-area">
                        <span class="collapse-icon" id="collapseIcon_${idx}">${isCollapsed ? '▶' : '▼'}</span>
                        <div class="role-name" data-edit-name="${idx}">${escapeHtml(role.roleName)}</div>
                        <div class="role-stats">📅 ${todayMinutes} min today | total ${totalRoleMinutes} min</div>
                    </div>
                    <div class="icon-row">
                        <button class="icon-btn delete-role-btn" data-del="${idx}">🗑</button>
                    </div>
                </div>
                <div class="role-content ${isCollapsed ? 'collapsed' : ''}" id="roleContent_${idx}">
                    <div class="quote-area" data-edit-quote="${idx}">
                        <span class="quote-text">“ ${escapeHtml(role.quote || 'Focus like a forest spirit')} ”</span>
                        <span class="edit-icon">✎</span>
                    </div>
                    <div class="time-tracker">
                        <span class="minutes-display">⏱️ today: ${todayMinutes} min</span>
                        <div class="add-time-group">
                            <input type="number" id="minutesInput_${idx}" class="time-input" value="15" step="5">
                            <button class="log-time-btn" data-addmin="${idx}">➕ Add minutes</button>
                        </div>
                        <span style="font-size:0.7rem;">✨ +1 token / 5min</span>
                    </div>
                    <div class="heatmap-container">
                        <div class="heatmap-title">
                            <span>📆 Weekly focus</span>
                            <div class="week-selector">
                                <button class="roleDecWeeks" data-idx="${idx}">−</button>
                                <span id="roleWeeksLabel_${idx}">${currentWeeks}</span><span> weeks</span>
                                <button class="roleIncWeeks" data-idx="${idx}">+</button>
                            </div>
                        </div>
                        <div id="roleHeatmap_${idx}"></div>
                        <div class="legend" style="justify-content: flex-end;">
                            <div class="legend-color" style="background:#ebedf0;"></div>
                            <div class="legend-color" style="background:#9be9a8;"></div>
                            <div class="legend-color" style="background:#40c463;"></div>
                            <div class="legend-color" style="background:#30a14e;"></div>
                            <div class="legend-color" style="background:#216e39;"></div>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
            
            // Render heatmap
            renderRoleHeatmap(idx, `roleHeatmap_${idx}`);
            
            // Collapse toggle
            const header = card.querySelector(`[data-toggle="${idx}"]`);
            header?.addEventListener('click', (e) => {
                if(e.target.closest('.icon-btn') || e.target.closest('[data-edit-name]') || e.target.closest('[data-edit-quote]')) return;
                toggleCollapse(idx);
            });
            
            // Add minutes
            const addBtn = card.querySelector(`[data-addmin="${idx}"]`);
            addBtn?.addEventListener('click', (e) => {
                e.stopPropagation();
                const input = document.getElementById(`minutesInput_${idx}`);
                let mins = parseInt(input.value);
                if(isNaN(mins) || mins<=0) mins = 5;
                addMinutesToRole(idx, mins);
            });
            
            // Edit name
            const nameSpan = card.querySelector(`[data-edit-name="${idx}"]`);
            nameSpan?.addEventListener('click', (e) => {
                e.stopPropagation();
                const newName = prompt("Edit role name:", role.roleName);
                if(newName && newName.trim()) { role.roleName = newName.trim(); renderRolesGrid(); updateGlobalHeatmap(); persistAll(); showMessage(`Role renamed`); }
            });
            
            // Edit quote
            const quoteDiv = card.querySelector(`[data-edit-quote="${idx}"]`);
            quoteDiv?.addEventListener('click', (e) => {
                e.stopPropagation();
                const newQuote = prompt("Edit focus quote:", role.quote || "");
                if(newQuote !== null) { role.quote = newQuote.trim() || "Stay present"; renderRolesGrid(); persistAll(); showMessage(`Quote updated`); }
            });
            
            // Delete
            const delBtn = card.querySelector(`[data-del="${idx}"]`);
            delBtn?.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteRole(idx);
            });
            
            // Week controls
            const decBtn = card.querySelector(`.roleDecWeeks[data-idx="${idx}"]`);
            const incBtn = card.querySelector(`.roleIncWeeks[data-idx="${idx}"]`);
            decBtn?.addEventListener('click', (e) => {
                e.stopPropagation();
                let w = roleWeeks[idx] || 16;
                if(w > 12) { w--; roleWeeks[idx] = w; document.getElementById(`roleWeeksLabel_${idx}`).innerText = w; renderRoleHeatmap(idx, `roleHeatmap_${idx}`); persistAll(); }
            });
            incBtn?.addEventListener('click', (e) => {
                e.stopPropagation();
                let w = roleWeeks[idx] || 16;
                if(w < 24) { w++; roleWeeks[idx] = w; document.getElementById(`roleWeeksLabel_${idx}`).innerText = w; renderRoleHeatmap(idx, `roleHeatmap_${idx}`); persistAll(); }
            });
        });
    }

    function addMinutesToRole(roleIdx, minutes) {
        if(minutes <= 0) return;
        const role = rolesData[roleIdx];
        if(!role) return;
        const todayKey = currentDateKey;
        if(!role.timeLogs) role.timeLogs = [];
        let existing = role.timeLogs.find(l => l.dateKey === todayKey);
        if(existing) existing.minutes += minutes;
        else role.timeLogs.push({ dateKey: todayKey, minutes: minutes });
        const tokensEarned = Math.floor(minutes / 5);
        if(tokensEarned > 0) { globalTokens += tokensEarned; updateTotalUI(); showMessage(`✨ +${tokensEarned} token (${minutes} min on "${role.roleName}")`); }
        else showMessage(`⏱️ +${minutes} min to "${role.roleName}"`);
        updateGlobalHeatmap();
        renderRolesGrid();
        persistAll();
    }

    function addNewRole() {
        let name = prompt("Role name:", "");
        if(!name) return;
        name = name.trim();
        if(rolesData.some(r=>r.roleName.toLowerCase()===name.toLowerCase())) { alert("Role exists"); return; }
        const quote = prompt("Focus quote (optional):", "One step at a time") || "One step at a time";
        rolesData.push({ roleName: name, quote: quote, timeLogs: [] });
        renderRolesGrid();
        updateGlobalHeatmap();
        persistAll();
    }

    function deleteRole(idx) {
        if(confirm(`Delete "${rolesData[idx].roleName}"?`)) {
            rolesData.splice(idx,1);
            // Clean up stored settings for this index
            delete roleWeeks[idx];
            delete roleCollapsed[idx];
            // re-index remaining settings (optional, but keep as is)
            updateGlobalHeatmap();
            renderRolesGrid();
            persistAll();
        }
    }

    function resetAllLogs() {
        if(confirm("Erase ALL time logs for every role? Tokens remain.")) {
            for(let role of rolesData) role.timeLogs = [];
            updateGlobalHeatmap();
            renderRolesGrid();
            persistAll();
            showMessage("All logs cleared");
        }
    }

    // Timer
    function updateGlobalTimerDisplay() { const mins=Math.floor(globalTimerSeconds/60), secs=globalTimerSeconds%60; document.getElementById('globalTimerDisplay').innerText=`${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`; }
    function startGlobalTimer() {
        if(globalTimerInterval) clearInterval(globalTimerInterval);
        let mins = parseInt(document.getElementById('globalTimerMins').value);
        if(isNaN(mins) || mins<=0) mins = 25;
        globalTimerSeconds = mins * 60;
        updateGlobalTimerDisplay();
        globalTimerInterval = setInterval(() => {
            if(globalTimerSeconds <= 0) {
                clearInterval(globalTimerInterval); globalTimerInterval=null;
                showMessage(`⏰ Timer finished! +${mins} minutes to?`);
                if(rolesData.length===0) { showMessage("No roles yet"); return; }
                let list = rolesData.map((r,i)=>`${i+1}: ${r.roleName}`).join("\n");
                let choice = prompt(`Add ${mins} focus minutes to which role?\n${list}`, "1");
                let idx = parseInt(choice)-1;
                if(!isNaN(idx) && idx>=0 && idx<rolesData.length) addMinutesToRole(idx, mins);
                else showMessage("No role selected");
                globalTimerSeconds=0; updateGlobalTimerDisplay();
                return;
            }
            globalTimerSeconds--;
            updateGlobalTimerDisplay();
        }, 1000);
    }
    function stopGlobalTimer() { if(globalTimerInterval) { clearInterval(globalTimerInterval); globalTimerInterval=null; showMessage("Timer stopped"); } globalTimerSeconds=0; updateGlobalTimerDisplay(); }

    function sleepAndJournal() {
        const text = document.getElementById('dailySummary').value.trim();
        if(!text) { alert("Write a thought before resting"); return; }
        journalLogs.unshift({ timestamp: getTimestamp(), entry: text });
        if(journalLogs.length>30) journalLogs.pop();
        document.getElementById('dailySummary').value = '';
        showMessage("🌙 Day archived");
        persistAll();
    }

    function persistAll() {
        const data = { version:"foldable_v4", tokens:globalTokens, rolesData, journalLogs, spendLogs, roleWeeks, roleCollapsed, globalWeeks, currentDateKey };
        localStorage.setItem("spirit_keeper_foldable", JSON.stringify(data));
    }

    function loadData() {
        const raw = localStorage.getItem("spirit_keeper_foldable");
        if(raw) {
            try {
                const d=JSON.parse(raw);
                globalTokens = d.tokens||0;
                rolesData = d.rolesData||[];
                journalLogs = d.journalLogs||[];
                spendLogs = d.spendLogs||[];
                roleWeeks = d.roleWeeks||{};
                roleCollapsed = d.roleCollapsed||{};
                globalWeeks = d.globalWeeks||16;
                for(let r of rolesData) if(!r.timeLogs) r.timeLogs=[];
                currentDateKey = getDateKey();
                updateTotalUI();
                updateGlobalHeatmap();
                renderRolesGrid();
            } catch(e) { freshStart(); }
        } else freshStart();
    }

    function freshStart() {
        globalTokens=0; rolesData=[]; journalLogs=[]; spendLogs=[]; roleWeeks={}; roleCollapsed={}; globalWeeks=16;
        currentDateKey=getDateKey();
        persistAll();
        updateTotalUI();
        updateGlobalHeatmap();
        renderRolesGrid();
    }

    function spendTokens(amount) {
        if(amount>globalTokens) { showMessage(`Not enough tokens`); return; }
        globalTokens-=amount;
        spendLogs.unshift({timestamp:getTimestamp(), amount});
        updateTotalUI(); persistAll();
        showMessage(`Spent ${amount} tokens`);
        if(document.getElementById('spendCurrentTokens')) document.getElementById('spendCurrentTokens').innerText=globalTokens;
    }

    function showSpendModal() {
        const modal=document.getElementById('spendModal');
        document.getElementById('spendCurrentTokens').innerText=globalTokens;
        const logDiv=document.getElementById('spendLogList');
        if(spendLogs.length===0) logDiv.innerHTML='<div>No transactions</div>';
        else logDiv.innerHTML=spendLogs.map(l=>`<div>🪙 ${l.timestamp} : -${l.amount}</div>`).join('');
        modal.classList.add('active');
    }

    function escapeHtml(str){ return String(str).replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

    document.addEventListener('DOMContentLoaded', () => {
        currentDateKey = getDateKey();
        loadData();
        setInterval(()=>{ document.getElementById('liveDate').innerText=getFormattedDate(); },60000);
        document.getElementById('liveDate').innerText=getFormattedDate();
        document.getElementById('addRoleBtn').addEventListener('click', addNewRole);
        document.getElementById('refreshAllBtn').addEventListener('click', resetAllLogs);
        document.getElementById('exportDataBtn').addEventListener('click',()=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({rolesData,globalTokens,journalLogs,spendLogs,roleWeeks,roleCollapsed,globalWeeks})],{type:'application/json'})); a.download=`focus_foldable.json`; a.click(); showMessage("Exported"); });
        document.getElementById('importDataBtn').addEventListener('click',()=>{ const inp=document.createElement('input'); inp.type='file'; inp.onchange=e=>{ const f=e.target.files[0]; const r=new FileReader(); r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(d.rolesData) rolesData=d.rolesData; if(d.tokens!==undefined) globalTokens=d.tokens; if(d.roleWeeks) roleWeeks=d.roleWeeks; if(d.roleCollapsed) roleCollapsed=d.roleCollapsed; if(d.globalWeeks) globalWeeks=d.globalWeeks; for(let role of rolesData) if(!role.timeLogs) role.timeLogs=[]; updateGlobalHeatmap(); renderRolesGrid(); updateTotalUI(); persistAll(); showMessage("Import success"); }catch(err){ alert("Invalid"); } }; r.readAsText(f); }; inp.click(); });
        document.getElementById('tokenBar').addEventListener('click', showSpendModal);
        document.getElementById('closeSpendBtn').addEventListener('click',()=>document.getElementById('spendModal').classList.remove('active'));
        document.querySelectorAll('.spend-btn').forEach(btn=>btn.addEventListener('click',()=>spendTokens(parseInt(btn.dataset.amount))));
        document.getElementById('sleepTriggerBtn').addEventListener('click', sleepAndJournal);
        document.getElementById('globalTimerStart').addEventListener('click', startGlobalTimer);
        document.getElementById('globalTimerStop').addEventListener('click', stopGlobalTimer);
        document.getElementById('globalDecWeeks').addEventListener('click', () => { if(globalWeeks>12){ globalWeeks--; document.getElementById('globalWeeksCount').innerText=globalWeeks; updateGlobalHeatmap(); persistAll(); } });
        document.getElementById('globalIncWeeks').addEventListener('click', () => { if(globalWeeks<24){ globalWeeks++; document.getElementById('globalWeeksCount').innerText=globalWeeks; updateGlobalHeatmap(); persistAll(); } });
        document.getElementById('globalWeeksCount').innerText = globalWeeks;
        window.addEventListener('click',(e)=>{ if(e.target.classList?.contains('modal-overlay')) e.target.classList.remove('active'); });
    });
</script>
</body>
</html>
